<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #1e293b;
      padding: 15px 20px;
    }

    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 3px solid #1e40af;
      padding-bottom: 10px;
      margin-bottom: 18px;
    }
    .title {
      font-size: 18px;
      font-weight: 800;
      color: #1e3a5f;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .subtitle {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }
    .period-box {
      text-align: right;
      font-size: 11px;
    }
    .period-box .label {
      color: #64748b;
      font-size: 9px;
    }
    .period-box .value {
      font-weight: 700;
      color: #1e3a5f;
    }

    .bs-card {
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .bs-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0f4ff;
      padding: 8px 14px;
      border-bottom: 1px solid #cbd5e1;
    }
    .bs-no {
      font-weight: bold;
      font-size: 12px;
      color: #1e3a5f;
    }
    .bs-meta {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .summary span {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 10px;
      background: #dbeafe;
    }
    .summary .kg { background: #fef3c7; }
    .summary .pcs { background: #dcfce7; }

    .kategori-title {
      background: #f8fafc;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 11px;
      color: #334155;
      border-bottom: 1px solid #e2e8f0;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 5px 8px;
      border: 1px solid #e2e8f0;
      font-size: 10px;
    }
    th {
      background: #f1f5f9;
      font-weight: 700;
      color: #475569;
      text-align: center;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .right { text-align: right; }
    .center { text-align: center; }

    .col-tgl { width: 12%; }
    .col-jenis { width: 22%; }
    .col-qty { width: 10%; }
    .col-sat { width: 6%; }

    .kategori-sum {
      padding: 4px 14px 8px;
      font-size: 9px;
      color: #64748b;
      border-bottom: 1px solid #e2e8f0;
    }
    .input-cell { background: #f8fafc; }
    .output-cell { background: #f0fdf4; font-weight: 600; }
    .empty-value { color: #94a3b8; font-style: italic; font-weight: normal; }

    .footer-note {
      margin-top: 12px;
      font-size: 9px;
      color: #94a3b8;
      text-align: center;
    }

    .no-data {
      border: 1px dashed #cbd5e1;
      padding: 30px;
      text-align: center;
      color: #94a3b8;
      border-radius: 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="report-header">
    <div>
      <div class="title">LAPORAN BONGKAR SUSUN</div>
      <div class="subtitle">Input dan Output per Kategori</div>
    </div>
    <div class="period-box">
      <div class="label">Periode</div>
      <div class="value">{{periode}}</div>
    </div>
  </div>

  {{content}}

  <div class="footer-note">
    Kg = Kilogram | Pcs = Pieces
  </div>
</body>
</html>
