<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #1e293b;
      padding: 15px 20px;
    }

    .report-header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 3px solid #1e40af;
    }
    .report-header h1 {
      font-size: 18px;
      color: #1e3a5f;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }
    .report-header .periode {
      font-size: 12px;
      color: #475569;
    }

    .group-section {
      margin-bottom: 22px;
    }
    .group-title-main {
      background: #1e40af;
      color: #fff;
      padding: 7px 14px;
      font-weight: bold;
      font-size: 13px;
      border-radius: 6px 6px 0 0;
      letter-spacing: 0.5px;
    }

    .sortir-card {
      border: 1px solid #cbd5e1;
      border-top: none;
      margin-bottom: 12px;
    }
    .sortir-card:last-child {
      margin-bottom: 0;
    }

    .sortir-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f0f4ff;
      padding: 8px 14px;
      border-bottom: 1px solid #cbd5e1;
    }
    .sortir-no {
      font-weight: bold;
      font-size: 12px;
      color: #1e3a5f;
    }
    .sortir-meta {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }
    .summary {
      text-align: right;
      font-size: 11px;
    }
    .summary-output {
      font-size: 14px;
      font-weight: bold;
      color: #1e40af;
      margin-bottom: 4px;
    }
    .summary span {
      display: inline-block;
      margin-left: 12px;
      padding: 2px 10px;
      background: #dbeafe;
      border-radius: 4px;
      font-weight: bold;
      font-size: 10px;
    }
    .summary .total-output {
      background: #dcfce7;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 5px 8px;
      border: 1px solid #e2e8f0;
      font-size: 10px;
    }
    th {
      background: #f1f5f9;
      font-weight: 700;
      color: #334155;
      text-align: center;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .center { text-align: center; }
    .right { text-align: right; }

    .col-asal { width: 22%; }
    .col-tgl { width: 13%; }
    .col-input { width: 18%; }
    .col-jlh { width: 10%; }
    .col-output { width: 22%; }
    .col-jumlah { width: 15%; }

    .input-cell { background: #f8fafc; }
    .output-cell { background: #f0fdf4; font-weight: 600; }
    .empty-output { color: #94a3b8; font-style: italic; font-weight: normal; }

    .no-data {
      text-align: center;
      padding: 40px 20px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="report-header">
    <h1>Laporan Sortir Reject</h1>
    <div class="periode">Periode : {{periode}}</div>
  </div>
  {{content}}
</body>
</html>
